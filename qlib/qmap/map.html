<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <title>Kuick Studio Liberary</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="QMap.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <!-- map intrigation start -->
    <section>
        <!-- ===== google map theme intrigation option ===== -->

        <div>
            <!-- Theme selector (optional) -->
            <!-- <select id="themeSelect">
        <option value="eclipse">Eclipse</option>
        <option value="alabaster">Alabaster</option>
        <option value="candy">Candy</option>
        <option value="nautical">Nautical</option>
        <option value="parchment">Parchment</option>
        </select> -->

            <!-- Map -->
            <!-- <div id="map"></div> -->

            <div id="map-container"></div>
            <!-- Deck.gl dependencies -->
            <script src="../../utils/deck.gl/dist.min.js"></script>
            <script src="../../utils/deck.gl/google-maps.min.js"></script>

            <!-- Include the vanilla JS library -->
            <script src="qmap.js"></script>
            <script>
                document.addEventListener("DOMContentLoaded", () => {
                    const markers = [
                        {
                            latitude: 22.5744,
                            longitude: 88.3629,
                        },
                        {
                            latitude: 22.6744,
                            longitude: 88.3629,
                        },

                    ];

                    const heatmapData = [
                        { latitude: "52.0328", longitude: "-5.0741", weight: 1 },
                        { latitude: "57.4893", longitude: "-6.098", weight: 2 },
                        { latitude: "59.141", longitude: "-3.3359", weight: 3 },
                        { latitude: "57.4983", longitude: "-6.0969", weight: 4 },
                        { latitude: "57.6406", longitude: "-6.2327", weight: 5 },
                        { latitude: "22.5744", longitude: "88.3629", weight: 1 },
                    ];


                    const map = new QMap("map-container", {
                        mapKey: "AIzaSyAilt_8cTAaLj51xHphaKPx_27jrrcrTAw", // Same key from original JSX
                        width: "100%",
                        height: "100%",
                        zoom: 12,
                        mapStyle: "alabaster",
                        markers: markers,
                        centerMarkers: [markers[0]],
                        boundaryEnabled: true,
                        showViewPresetSelector: true,
                        cameraControlEnabled: true,
                        zoomControlsEnabled: true,
                        mapZoomEnabled: true,

                        enableFullScreen: true,

                        // Polyline / Path Example
                        markerPath: [
                            {
                                srcLatitude: 22.5744, srcLongitude: 88.3629,
                                desLatitude: 22.6744, desLongitude: 88.3629,
                                strokeColor: "#FF0000", strokeWidth: 3, pathType: "straightline"
                            },

                        ],

                        // Heatmap Example
                        enable: false,
                        radius: 30,
                        intensity: 1,
                    });

                    // To test destruction of map, you can uncomment this:
                    // setTimeout(() => { map.destroy(); }, 15000);
                });
            </script>

        </div>
        <!-- ===== /google map theme intrigation option ===== -->
    </section>
    <!-- /map intrigation end -->


    <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
    <!-- /map end-->

</body>

</html>
